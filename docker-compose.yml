name: ${COMPOSE_PROJECT_NAME:-websidian}

services:
  sync:
    build:
      context: .
      dockerfile: apps/sync/Dockerfile
    environment:
      - DB_PATH=/data/websidian.db
      - DATA_DIR=/data
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - WEB_URL=${WEB_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - AI_BOT_TOKEN=${AI_BOT_TOKEN}
    volumes:
      - sync_data:/data
    networks:
      - internal

  mcp:
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    environment:
      - MCP_PORT=${MCP_PORT:-3100}
      - MCP_BEARER=${MCP_BEARER}
      - MCP_URL=${MCP_URL}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - API_URL=http://sync:1235
      - SYNC_URL=ws://sync:1234
      - AI_BOT_TOKEN=${AI_BOT_TOKEN}
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - DOMAIN=${DOMAIN}
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-websidian}
    expose:
      - 80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - sync
      - mcp
      - web
    networks:
      - internal
      - proxy_network

volumes:
  sync_data:

networks:
  internal:
  proxy_network:
    external: true
